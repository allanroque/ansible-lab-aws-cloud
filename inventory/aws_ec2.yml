---
plugin: amazon.aws.aws_ec2
regions:
  - us-east-1
filters:
  tag:Project: ansible-aws-lab
  instance-state-name: running
keyed_groups:
  - key: tags.Environment
    prefix: env
  - key: tags.Role
    prefix: role
  - key: instance_type
    prefix: type
hostnames:
  - dns-name
  - ip-address
compose:
  ansible_host: public_ip_address
