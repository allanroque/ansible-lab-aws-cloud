---
# ─────────────────────────────────────────────────────────────────────────────
# Playbook  : provisioning-aws-ec2.yml
# Purpose   : Provision RHEL EC2 instances into existing VPC/SG infrastructure
# Phase     : 2 — Compute
#
# AAP Survey variables (all overridable via extra_vars):
#   ec2_server_name    — base name  (e.g. "webserver" → webserver1, webserver2 …)
#   ec2_instance_size  — t2.micro | t2.small | t2.medium
#   ec2_quantity       — number of instances to launch (integer ≥ 1)
#   ec2_server_role    — tag: Role  (e.g. webserver, database, bastion)
#   ec2_server_group   — tag: Group (e.g. prod, lab, staging)
#   aws_region         — AWS region (default: us-east-2)
#
# Run locally:
#   ansible-playbook playbooks/provisioning-aws-ec2.yml \
#     -e ec2_server_name=app \
#     -e ec2_instance_size=t2.small \
#     -e ec2_quantity=3 \
#     -e ec2_server_role=webserver \
#     -e ec2_server_group=lab
# ─────────────────────────────────────────────────────────────────────────────
- name: Lookup existing VPC and security group
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../group_vars/all/vars.yml

  tasks:
    - name: Validate instance size input
      ansible.builtin.assert:
        that: ec2_instance_size in ['t2.micro', 't2.small', 't2.medium']
        fail_msg: "ec2_instance_size must be one of: t2.micro, t2.small, t2.medium — got '{{ ec2_instance_size }}'"

    - name: Validate quantity
      ansible.builtin.assert:
        that: ec2_quantity | int >= 1
        fail_msg: "ec2_quantity must be an integer >= 1"

    - name: Lookup VPC by name tag
      amazon.aws.ec2_vpc_net_info:
        region:     "{{ aws_region }}"
        filters:
          "tag:Name": "{{ vpc_name }}"
      register: vpc_info

    - name: Assert VPC exists
      ansible.builtin.assert:
        that: vpc_info.vpcs | length > 0
        fail_msg: >
          VPC '{{ vpc_name }}' not found in {{ aws_region }}.
          Run provisioning-aws-infra.yml first to create the network foundation.

    - name: Lookup public subnet
      amazon.aws.ec2_vpc_subnet_info:
        region:     "{{ aws_region }}"
        filters:
          "tag:Name": "{{ public_subnet_name }}"
      register: subnet_info

    - name: Lookup security group
      amazon.aws.ec2_security_group_info:
        region:     "{{ aws_region }}"
        filters:
          group-name: "{{ sg_name }}"
      register: sg_info

    - name: Set infrastructure IDs from existing resources
      ansible.builtin.set_fact:
        vpc_id:           "{{ vpc_info.vpcs[0].vpc_id }}"
        public_subnet_id: "{{ subnet_info.subnets[0].subnet_id }}"
        sg_id:            "{{ sg_info.security_groups[0].group_id }}"

    - name: Show resolved infrastructure
      ansible.builtin.debug:
        msg:
          - "VPC    : {{ vpc_id }}"
          - "Subnet : {{ public_subnet_id }}"
          - "SG     : {{ sg_id }}"
          - "Region : {{ aws_region }}"
          - "Size   : {{ ec2_instance_size }}"
          - "Name   : {{ ec2_server_name }}1 … {{ ec2_server_name }}{{ ec2_quantity }}"
          - "Role   : {{ ec2_server_role }}"
          - "Group  : {{ ec2_server_group }}"

- name: Provision RHEL EC2 instances
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../group_vars/all/vars.yml

  roles:
    - role: ec2
      tags: [ec2, compute]

# ─── Validate access + collect server details ─────────────────────────────────
- name: Validate SSH access and collect server information
  hosts: ec2_newly_provisioned
  gather_facts: true
  become: false

  tasks:
    - name: Server detail report
      ansible.builtin.debug:
        msg:
          - "╔══════════════════════════════════════════════════════════╗"
          - "  SERVER : {{ ec2_name }}"
          - "╠══════════════════════════════════════════════════════════╣"
          - "  Instance ID   : {{ ec2_instance_id }}"
          - "  Public IP     : {{ ec2_public_ip }}"
          - "  Private IP    : {{ ec2_private_ip }}"
          - "──────────────────────────────────────────────────────────"
          - "  Hostname      : {{ ansible_hostname }}"
          - "  FQDN          : {{ ansible_fqdn }}"
          - "  OS            : {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "  Kernel        : {{ ansible_kernel }}"
          - "  Architecture  : {{ ansible_architecture }}"
          - "──────────────────────────────────────────────────────────"
          - "  vCPUs         : {{ ansible_processor_vcpus }}"
          - "  RAM Total     : {{ (ansible_memtotal_mb / 1024) | round(1) }} GB"
          - "  RAM Free      : {{ (ansible_memfree_mb / 1024) | round(1) }} GB"
          - "──────────────────────────────────────────────────────────"
          - "  Root disk     : {{ ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='size_total') | first | human_readable }}"
          - "  Root disk use : {{ ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='size_available') | first | human_readable }} available"
          - "──────────────────────────────────────────────────────────"
          - "  SSH user      : {{ ansible_user_id }}"
          - "  Connection    : OK"
          - "╚══════════════════════════════════════════════════════════╝"

    - name: Aggregate server info for set_stats
      ansible.builtin.set_fact:
        server_detail:
          name:         "{{ ec2_name }}"
          instance_id:  "{{ ec2_instance_id }}"
          public_ip:    "{{ ec2_public_ip }}"
          private_ip:   "{{ ec2_private_ip }}"
          hostname:     "{{ ansible_hostname }}"
          fqdn:         "{{ ansible_fqdn }}"
          os:           "{{ ansible_distribution }} {{ ansible_distribution_version }}"
          kernel:       "{{ ansible_kernel }}"
          vcpus:        "{{ ansible_processor_vcpus }}"
          ram_gb:       "{{ (ansible_memtotal_mb / 1024) | round(1) }}"
          ssh_user:     "{{ ansible_user_id }}"
          ssh_status:   "ok"

- name: Export deployment info to workflow
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../group_vars/all/vars.yml

  tasks:
    - name: Export EC2 deployment info to workflow (set_stats)
      ansible.builtin.set_stats:
        aggregate: false
        data:
          stats_ec2_deployed_hosts: "{{ ec2_deployed_hosts }}"
          stats_ec2_server_details: "{{ groups['ec2_newly_provisioned'] | map('extract', hostvars, 'server_detail') | list }}"
          stats_ec2_server_name:    "{{ ec2_server_name }}"
          stats_ec2_instance_size:  "{{ ec2_instance_size }}"
          stats_ec2_quantity:       "{{ ec2_quantity | int }}"
          stats_ec2_server_role:    "{{ ec2_server_role }}"
          stats_ec2_server_group:   "{{ ec2_server_group }}"
          stats_ec2_ami_id:         "{{ ec2_ami_id }}"
          stats_aws_region:         "{{ aws_region }}"
          stats_phase:              "compute_ready"
