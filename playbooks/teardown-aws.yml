---
# ─────────────────────────────────────────────────────────────────────────────
# Playbook  : teardown-aws.yml
# Purpose   : Destroy ALL resources created by this project
# WARNING   : This action is IRREVERSIBLE
# Run       : ansible-playbook playbooks/teardown-aws.yml
#             ansible-playbook playbooks/teardown-aws.yml -e "confirm_destroy=yes"
# ─────────────────────────────────────────────────────────────────────────────
- name: Teardown AWS infrastructure
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../group_vars/all/vars.yml

  vars:
    confirm_destroy: "no"

  pre_tasks:
    - name: Confirm destructive operation
      ansible.builtin.assert:
        that: confirm_destroy == "yes"
        fail_msg: >
          Safety check failed.
          Pass -e "confirm_destroy=yes" to confirm you want to destroy all resources.

    - name: Lookup VPC
      amazon.aws.ec2_vpc_net_info:
        region:     "{{ aws_region }}"
        filters:
          "tag:Name": "{{ vpc_name }}"
      register: vpc_info

    - name: Abort if VPC not found
      ansible.builtin.meta: end_play
      when: vpc_info.vpcs | length == 0

    - name: Set VPC ID
      ansible.builtin.set_fact:
        vpc_id: "{{ vpc_info.vpcs[0].vpc_id }}"

  tasks:
    - name: Terminate ALL EC2 instances tagged with project
      amazon.aws.ec2_instance:
        region:     "{{ aws_region }}"
        state: absent
        filters:
          "tag:Project": "{{ project_name }}"
          instance-state-name: ["running", "stopped", "pending"]
      tags: [ec2, teardown]

    - name: Remove SSH key pair
      amazon.aws.ec2_key:
        name:       "{{ ec2_key_name }}"
        region:     "{{ aws_region }}"
        state: absent
      tags: [ec2, teardown]

    - name: Remove Application Load Balancer
      amazon.aws.elb_application_lb:
        name:       "{{ alb_name }}"
        region:     "{{ aws_region }}"
        state: absent
        wait: true
      tags: [alb, teardown]

    - name: Remove target group
      community.aws.elb_target_group:
        name:       "{{ project_name }}-tg"
        region:     "{{ aws_region }}"
        state: absent
      tags: [alb, teardown]

    - name: Remove security group
      amazon.aws.ec2_security_group:
        name:       "{{ sg_name }}"
        region:     "{{ aws_region }}"
        vpc_id:     "{{ vpc_id }}"
        state: absent
      tags: [security_group, teardown]

    - name: Remove route tables (non-main)
      amazon.aws.ec2_vpc_route_table:
        region:     "{{ aws_region }}"
        vpc_id:     "{{ vpc_id }}"
        tags:
          Name: "{{ route_table_name }}"
        state: absent
      tags: [vpc, teardown]

    - name: Remove Internet Gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id:     "{{ vpc_id }}"
        region:     "{{ aws_region }}"
        state: absent
      tags: [vpc, teardown]

    - name: Gather subnets in VPC
      amazon.aws.ec2_vpc_subnet_info:
        region:     "{{ aws_region }}"
        filters:
          vpc-id: "{{ vpc_id }}"
      register: subnet_info
      tags: [vpc, teardown]

    - name: Remove subnets
      amazon.aws.ec2_vpc_subnet:
        region:     "{{ aws_region }}"
        vpc_id:     "{{ vpc_id }}"
        cidr:       "{{ item.cidr_block }}"
        state: absent
      loop: "{{ subnet_info.subnets }}"
      tags: [vpc, teardown]

    - name: Remove VPC
      amazon.aws.ec2_vpc_net:
        name:       "{{ vpc_name }}"
        cidr_block: "{{ vpc_cidr }}"
        region:     "{{ aws_region }}"
        state: absent
      tags: [vpc, teardown]

  post_tasks:
    - name: Teardown complete
      ansible.builtin.debug:
        msg: "All resources for project '{{ project_name }}' have been removed."

    - name: Export teardown status to workflow (set_stats)
      ansible.builtin.set_stats:
        aggregate: false
        data:
          stats_teardown_status: "completed"
          stats_project_name:    "{{ project_name }}"
          stats_aws_region:      "{{ aws_region }}"
          stats_phase:           "destroyed"
