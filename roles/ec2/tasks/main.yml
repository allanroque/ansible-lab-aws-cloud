---
# ─── 1. AMI — latest RHEL from Red Hat official account ─────────────────────
# Key pair is provisioned in provisioning-aws.yml (infra foundation)

- name: Find latest RHEL AMI in target region
  amazon.aws.ec2_ami_info:
    region:     "{{ aws_region }}"
    access_key: "{{ aws_access_key }}"
    secret_key: "{{ aws_secret_key }}"
    owners:     ["{{ ec2_rhel_owner }}"]
    filters:
      name:               "{{ ec2_rhel_version }}"
      architecture:       x86_64
      virtualization-type: hvm
      root-device-type:   ebs
      state:              available
  register: rhel_ami_info

- name: Set RHEL AMI ID (most recent)
  ansible.builtin.set_fact:
    ec2_ami_id: "{{ (rhel_ami_info.images | sort(attribute='creation_date') | last).image_id }}"

- name: Show RHEL AMI selected
  ansible.builtin.debug:
    msg: "AMI: {{ ec2_ami_id }} ({{ (rhel_ami_info.images | sort(attribute='creation_date') | last).name }})"

# ─── 3. Launch instances ──────────────────────────────────────────────────────

- name: "Launch EC2 instance {{ ec2_server_name }}{{ item }}"
  amazon.aws.ec2_instance:
    name:          "{{ ec2_server_name }}{{ item }}"
    key_name:      "{{ ec2_key_name }}"
    instance_type: "{{ ec2_instance_size }}"
    image_id:      "{{ ec2_ami_id }}"
    region:        "{{ aws_region }}"
    access_key:    "{{ aws_access_key }}"
    secret_key:    "{{ aws_secret_key }}"
    vpc_subnet_id: "{{ public_subnet_id }}"
    security_groups:
      - "{{ sg_id }}"
    network:
      assign_public_ip: true
    state: running
    wait:  true
    wait_timeout: 300
    tags: "{{ common_tags | combine({
      'Name':  ec2_server_name ~ item,
      'Role':  ec2_server_role,
      'Group': ec2_server_group
    }) }}"
  loop: "{{ range(1, ec2_quantity | int + 1) | list }}"
  register: ec2_results

# ─── 4. Build IP summary ──────────────────────────────────────────────────────

- name: Collect instance info
  ansible.builtin.set_fact:
    ec2_deployed_hosts: >-
      {{
        ec2_deployed_hosts | default([]) + [{
          'name':       ec2_server_name ~ item.item,
          'instance_id': item.instances[0].instance_id,
          'public_ip':   item.instances[0].public_ip_address,
          'private_ip':  item.instances[0].private_ip_address,
          'state':       item.instances[0].state.name
        }]
      }}
  loop: "{{ ec2_results.results }}"
  loop_control:
    label: "{{ ec2_server_name }}{{ item.item }}"

# ─── 5. Summary ───────────────────────────────────────────────────────────────

- name: Provisioning Summary
  ansible.builtin.debug:
    msg:
      - "════════════════════════════════════════════════"
      - " ansible-aws-lab — EC2 Provisioning Complete"
      - "════════════════════════════════════════════════"
      - " Region   : {{ aws_region }}"
      - " AMI      : {{ ec2_ami_id }}"
      - " Size     : {{ ec2_instance_size }}"
      - " Key pair : {{ ec2_key_name }}"
      - " Role     : {{ ec2_server_role }}"
      - " Group    : {{ ec2_server_group }}"
      - "────────────────────────────────────────────────"
      - "{% for h in ec2_deployed_hosts %}\
         {{ h.name }} | {{ h.instance_id }} | public: {{ h.public_ip }} | private: {{ h.private_ip }} | {{ h.state }}\
         {% endfor %}"
      - "════════════════════════════════════════════════"
      - " SSH: ssh -i <key> ec2-user@<public_ip>"
      - "════════════════════════════════════════════════"
