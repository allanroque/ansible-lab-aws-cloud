---
# ─── 1. User and directories ──────────────────────────────────────────────────

- name: Create application user
  ansible.builtin.user:
    name:        "{{ app_user }}"
    system:      true
    shell:       /sbin/nologin
    create_home: false

- name: Create application directory
  ansible.builtin.file:
    path:  "{{ app_deploy_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode:  "0755"

# ─── 2. Install runtime dependencies ──────────────────────────────────────────

- name: Install Python and pip
  ansible.builtin.dnf:
    name:
      - python3
      - python3-pip
    state: present

# ─── 3. Deploy application files ──────────────────────────────────────────────

- name: Deploy app.py
  ansible.builtin.template:
    src:   app.py.j2
    dest:  "{{ app_deploy_dir }}/app.py"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode:  "0644"
  notify: restart app

- name: Deploy requirements.txt
  ansible.builtin.template:
    src:   requirements.txt.j2
    dest:  "{{ app_deploy_dir }}/requirements.txt"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode:  "0644"

- name: Install Python dependencies
  ansible.builtin.pip:
    requirements: "{{ app_deploy_dir }}/requirements.txt"
    state:        present

# ─── 4. Systemd service ───────────────────────────────────────────────────────

- name: Deploy systemd service unit
  ansible.builtin.template:
    src:   app.service.j2
    dest:  "/etc/systemd/system/{{ app_name }}.service"
    owner: root
    group: root
    mode:  "0644"
  notify: restart app

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Ensure application service is started and enabled
  ansible.builtin.service:
    name:    "{{ app_name }}"
    state:   started
    enabled: true

# ─── 5. Firewall ──────────────────────────────────────────────────────────────

- name: Gather service facts
  ansible.builtin.service_facts:

- name: Allow app port in firewalld
  ansible.posix.firewalld:
    port:      "{{ app_port }}/tcp"
    permanent: true
    state:     enabled
    immediate: true
  when:
    - ansible_facts.services['firewalld.service'] is defined
    - ansible_facts.services['firewalld.service']['state'] == 'running'

# ─── 6. Summary ───────────────────────────────────────────────────────────────

- name: Show application summary
  ansible.builtin.debug:
    msg:
      - "Application deployed"
      - "Name    : {{ app_name }}"
      - "Version : {{ app_version }}"
      - "Host    : {{ ansible_hostname }}"
      - "Port    : {{ app_port }}"
      - "Dir     : {{ app_deploy_dir }}"
      - "URL     : http://{{ ansible_host }}:{{ app_port }}"
      - "Health  : http://{{ ansible_host }}:{{ app_port }}/health"
