---
# ─── 1. User and directories ──────────────────────────────────────────────────

- name: Create application user
  ansible.builtin.user:
    name:       "{{ app_user }}"
    system:     true
    shell:      /sbin/nologin
    create_home: false

- name: Create application directory
  ansible.builtin.file:
    path:  "{{ app_deploy_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode:  "0755"

# ─── 2. Install dependencies ──────────────────────────────────────────────────

- name: Install runtime dependencies
  ansible.builtin.dnf:
    name:
      - python3
      - python3-pip
      - git
    state: present

# ─── 3. Deploy application ────────────────────────────────────────────────────

- name: Clone application repository
  ansible.builtin.git:
    repo:    "{{ app_repo_url }}"
    dest:    "{{ app_deploy_dir }}"
    version: "{{ app_repo_branch }}"
    force:   true
  become_user: "{{ app_user }}"
  when: app_repo_url | length > 0
  notify: restart app

- name: Install Python requirements
  ansible.builtin.pip:
    requirements: "{{ app_deploy_dir }}/requirements.txt"
    state:        present
  when: app_repo_url | length > 0
  ignore_errors: true

# ─── 4. Systemd service ───────────────────────────────────────────────────────

- name: Deploy systemd service unit
  ansible.builtin.template:
    src:   app.service.j2
    dest:  "/etc/systemd/system/{{ app_name }}.service"
    owner: root
    group: root
    mode:  "0644"
  notify: restart app

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Ensure application service is started and enabled
  ansible.builtin.service:
    name:    "{{ app_name }}"
    state:   started
    enabled: true

- name: Show application summary
  ansible.builtin.debug:
    msg:
      - "Application deployed"
      - "Name   : {{ app_name }}"
      - "Host   : {{ ansible_hostname }}"
      - "Port   : {{ app_port }}"
      - "Dir    : {{ app_deploy_dir }}"
      - "Branch : {{ app_repo_branch }}"
      - "URL    : http://{{ ansible_default_ipv4.address }}:{{ app_port }}"
