---
- name: Create VPC
  amazon.aws.ec2_vpc_net:
    name:           "{{ vpc_name }}"
    cidr_block:     "{{ vpc_cidr }}"
    region:         "{{ aws_region }}"
    dns_support:    true
    dns_hostnames:  true
    tags: "{{ common_tags | combine({'Name': vpc_name}) }}"
  register: vpc_result

- name: Create public subnet
  amazon.aws.ec2_vpc_subnet:
    vpc_id:     "{{ vpc_result.vpc.id }}"
    cidr:       "{{ public_subnet_cidr }}"
    az:         "{{ public_subnet_az }}"
    region:     "{{ aws_region }}"
    map_public: true
    tags: "{{ common_tags | combine({'Name': public_subnet_name}) }}"
  register: subnet_result

- name: Create Internet Gateway
  amazon.aws.ec2_vpc_igw:
    vpc_id: "{{ vpc_result.vpc.id }}"
    region: "{{ aws_region }}"
    state:  present
    tags: "{{ common_tags | combine({'Name': igw_name}) }}"
  register: igw_result

- name: Create public route table
  amazon.aws.ec2_vpc_route_table:
    vpc_id:  "{{ vpc_result.vpc.id }}"
    region:  "{{ aws_region }}"
    subnets:
      - "{{ subnet_result.subnet.id }}"
    routes:
      - dest:       "0.0.0.0/0"
        gateway_id: "{{ igw_result.gateway_id }}"
    tags: "{{ common_tags | combine({'Name': route_table_name}) }}"
  register: rt_result

- name: Expose VPC facts for downstream roles
  ansible.builtin.set_fact:
    vpc_id:           "{{ vpc_result.vpc.id }}"
    public_subnet_id: "{{ subnet_result.subnet.id }}"
    igw_id:           "{{ igw_result.gateway_id }}"

- name: Show VPC summary
  ansible.builtin.debug:
    msg:
      - "VPC ID       : {{ vpc_id }}"
      - "Subnet ID    : {{ public_subnet_id }}"
      - "IGW ID       : {{ igw_id }}"
      - "Route Table  : {{ rt_result.route_table.id }}"
