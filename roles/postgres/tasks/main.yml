---
# ─── 1. Install ───────────────────────────────────────────────────────────────

- name: Install PostgreSQL packages
  ansible.builtin.dnf:
    name:
      - postgresql-server
      - postgresql-contrib
      - python3-psycopg2
    state: present

# ─── 2. Initialize ────────────────────────────────────────────────────────────

- name: Initialize PostgreSQL database cluster
  ansible.builtin.command:
    cmd:     postgresql-setup --initdb
    creates: "{{ postgres_data_dir }}/PG_VERSION"

# ─── 3. Configure ─────────────────────────────────────────────────────────────

- name: Configure listen address
  ansible.builtin.lineinfile:
    path:   "{{ postgres_data_dir }}/postgresql.conf"
    regexp: "^#?listen_addresses"
    line:   "listen_addresses = '{{ postgres_listen_address }}'"
  notify: restart postgresql

- name: Configure port
  ansible.builtin.lineinfile:
    path:   "{{ postgres_data_dir }}/postgresql.conf"
    regexp: "^#?port"
    line:   "port = {{ postgres_port }}"
  notify: restart postgresql

- name: Deploy pg_hba.conf
  ansible.builtin.template:
    src:   pg_hba.conf.j2
    dest:  "{{ postgres_data_dir }}/pg_hba.conf"
    owner: postgres
    group: postgres
    mode:  "0600"
  notify: restart postgresql

# ─── 4. Service ───────────────────────────────────────────────────────────────

- name: Ensure PostgreSQL is started and enabled
  ansible.builtin.service:
    name:    postgresql
    state:   started
    enabled: true

# ─── 5. Database and user ─────────────────────────────────────────────────────

- name: Create application database
  community.postgresql.postgresql_db:
    name:  "{{ postgres_db_name }}"
    state: present
  become_user: postgres

- name: Create application user
  community.postgresql.postgresql_user:
    name:     "{{ postgres_db_user }}"
    password: "{{ postgres_db_password }}"
    db:       "{{ postgres_db_name }}"
    priv:     ALL
    state:    present
  become_user: postgres

- name: Show PostgreSQL summary
  ansible.builtin.debug:
    msg:
      - "PostgreSQL installed and configured"
      - "Host     : {{ ansible_hostname }}"
      - "Port     : {{ postgres_port }}"
      - "Database : {{ postgres_db_name }}"
      - "User     : {{ postgres_db_user }}"
