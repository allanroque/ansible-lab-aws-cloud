---
# ─── 1. Install ───────────────────────────────────────────────────────────────

- name: Install PostgreSQL packages
  ansible.builtin.dnf:
    name:
      - postgresql-server
      - postgresql-contrib
    state: present

# ─── 2. Initialize ────────────────────────────────────────────────────────────

- name: Initialize PostgreSQL database cluster
  ansible.builtin.command:
    cmd:     postgresql-setup --initdb
    creates: "{{ postgres_data_dir }}/PG_VERSION"

# ─── 3. Configure ─────────────────────────────────────────────────────────────

- name: Configure listen address
  ansible.builtin.lineinfile:
    path:   "{{ postgres_data_dir }}/postgresql.conf"
    regexp: "^#?listen_addresses"
    line:   "listen_addresses = '{{ postgres_listen_address }}'"
  notify: restart postgresql

- name: Configure port
  ansible.builtin.lineinfile:
    path:   "{{ postgres_data_dir }}/postgresql.conf"
    regexp: "^#?port"
    line:   "port = {{ postgres_port }}"
  notify: restart postgresql

- name: Deploy pg_hba.conf
  ansible.builtin.template:
    src:   pg_hba.conf.j2
    dest:  "{{ postgres_data_dir }}/pg_hba.conf"
    owner: postgres
    group: postgres
    mode:  "0600"
  notify: restart postgresql

# ─── 4. Service ───────────────────────────────────────────────────────────────

- name: Ensure PostgreSQL is started and enabled
  ansible.builtin.service:
    name:    postgresql
    state:   started
    enabled: true

# ─── 5. Database and user ─────────────────────────────────────────────────────

- name: Create application database
  ansible.builtin.command:
    cmd: psql -c "SELECT 1 FROM pg_database WHERE datname='{{ postgres_db_name }}'" | grep -q 1 || createdb {{ postgres_db_name }}
  become: true
  become_user: postgres
  register: _db_check
  changed_when: "'CREATE DATABASE' in _db_check.stdout"

- name: Create application user
  ansible.builtin.command:
    cmd: >
      psql -c "DO \$\$
      BEGIN
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='{{ postgres_db_user }}') THEN
          CREATE USER {{ postgres_db_user }} WITH PASSWORD '{{ postgres_db_password }}';
          GRANT ALL PRIVILEGES ON DATABASE {{ postgres_db_name }} TO {{ postgres_db_user }};
        END IF;
      END \$\$;"
  become: true
  become_user: postgres
  changed_when: false

- name: Show PostgreSQL summary
  ansible.builtin.debug:
    msg:
      - "PostgreSQL installed and configured"
      - "Host     : {{ ansible_hostname }}"
      - "Port     : {{ postgres_port }}"
      - "Database : {{ postgres_db_name }}"
      - "User     : {{ postgres_db_user }}"
