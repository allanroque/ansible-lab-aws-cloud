---
- name: Create ALB target group
  amazon.aws.elb_target_group:
    name:        "{{ project_name }}-tg"
    protocol:    http
    port:        "{{ alb_target_port }}"
    vpc_id:  "{{ vpc_id }}"
    region:  "{{ aws_region }}"
    health_check_protocol:      http
    health_check_path:          /health
    health_check_interval:      30
    healthy_threshold_count:    2
    unhealthy_threshold_count:  3
    state: present
    tags: "{{ common_tags | combine({'Name': project_name + '-tg'}) }}"
  register: tg_result

- name: Create Application Load Balancer
  amazon.aws.elb_application_lb:
    name:            "{{ alb_name }}"
    region:          "{{ aws_region }}"
    security_groups: ["{{ sg_id }}"]
    subnets:
      - "{{ public_subnet_id }}"
    scheme: internet-facing
    ip_address_type: ipv4
    listeners:
      - Protocol: HTTP
        Port:     80
        DefaultActions:
          - Type: forward
            TargetGroupArn: "{{ tg_result.target_group_arn }}"
    state: present
    tags: "{{ common_tags | combine({'Name': alb_name}) }}"
  register: alb_result

- name: Expose ALB facts
  ansible.builtin.set_fact:
    alb_dns:  "{{ alb_result.dns_name }}"
    alb_arn:  "{{ alb_result.load_balancer_arn }}"
    tg_arn:   "{{ tg_result.target_group_arn }}"

- name: Show ALB summary
  ansible.builtin.debug:
    msg:
      - "ALB Name : {{ alb_name }}"
      - "ALB DNS  : {{ alb_dns }}"
