---
# ─── Project ────────────────────────────────────────────────────────────────
project_name: ansible-aws-lab
deploy_env:   lab

# ─── AWS Region ─────────────────────────────────────────────────────────────
aws_region: us-east-2

# ─── VPC ────────────────────────────────────────────────────────────────────
vpc_name:  "{{ project_name }}-vpc"
vpc_cidr:  "10.10.0.0/16"

# ─── Subnets ─────────────────────────────────────────────────────────────────
public_subnet_cidr: "10.10.1.0/24"
public_subnet_az:   "{{ aws_region }}a"
public_subnet_name: "{{ project_name }}-public-subnet"

# ─── Internet Gateway ────────────────────────────────────────────────────────
igw_name: "{{ project_name }}-igw"

# ─── Route Table ─────────────────────────────────────────────────────────────
route_table_name: "{{ project_name }}-public-rt"

# ─── Security Groups ─────────────────────────────────────────────────────────
sg_name:        "{{ project_name }}-sg"
sg_description: "Security group for {{ project_name }} lab"

# ─── EC2 ─────────────────────────────────────────────────────────────────────
# Overridable via AAP survey / extra_vars
ec2_server_name:    server
ec2_instance_size:  t2.micro          # t2.micro | t2.small | t2.medium
ec2_server_role:    webserver
ec2_server_group:   lab
ec2_quantity:       1

# Key pair — public key imported into AWS
ec2_key_name:       "{{ project_name }}-key"
ec2_ssh_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINA5y99IQ6rNhG6DwmoLAoWwyIPLpHdKI4pg4EA4DZBa allanrafaelroque@gmail.com"

# RHEL — owner 309956199498 = Red Hat official account
ec2_rhel_owner:     "309956199498"
ec2_rhel_version:   "RHEL-9*GA*"

# ─── ALB ─────────────────────────────────────────────────────────────────────
alb_name:          "{{ project_name }}-alb"
alb_target_port:   8080

# ─── Common Tags ─────────────────────────────────────────────────────────────
common_tags:
  Project:     "{{ project_name }}"
  Environment: "{{ deploy_env }}"
  ManagedBy:   ansible
